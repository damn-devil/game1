<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Open World 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;touch-action:none;font-family:sans-serif}
canvas{display:block}
#joy-zone{position:fixed;bottom:20px;left:20px;width:160px;height:160px;z-index:100}
#joy-base{width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.25);position:relative}
#joy-thumb{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,0.45);position:absolute;top:53px;left:53px;pointer-events:none}
#dpad{position:fixed;bottom:20px;left:20px;width:160px;height:160px;z-index:100;display:none}
#dpad .dbtn{position:absolute;width:60px;height:60px;border-radius:12px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.35);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;user-select:none}
#dpad .dbtn:active{background:rgba(255,255,255,0.5)}
#du{top:0;left:50px}#dd{bottom:0;left:50px}#dl{left:0;top:50px}#dr{right:0;top:50px}
#act-m{position:fixed;bottom:40px;right:40px;width:80px;height:80px;border-radius:50%;background:rgba(80,200,80,0.3);border:2px solid rgba(80,200,80,0.5);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;z-index:100;user-select:none}
#act-m:active{background:rgba(80,200,80,0.6)}
#act-a{position:fixed;bottom:135px;right:40px;width:70px;height:70px;border-radius:50%;background:rgba(255,60,60,0.3);border:2px solid rgba(255,60,60,0.5);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;z-index:100;user-select:none}
#act-a:active{background:rgba(255,60,60,0.6)}
#act-s{position:fixed;bottom:40px;right:135px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,80,0.2);border:2px solid rgba(255,255,80,0.4);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;z-index:100;user-select:none}
#act-s:active{background:rgba(255,255,80,0.5)}
#hp{position:fixed;top:10px;left:10px;width:220px;height:22px;background:rgba(0,0,0,0.55);border-radius:11px;overflow:hidden;z-index:100}
#hp-f{width:100%;height:100%;background:linear-gradient(90deg,#ff3333,#33ff33);border-radius:11px;transition:width .2s}
#hp-t{position:fixed;top:36px;left:10px;color:#fff;font-size:13px;z-index:100;text-shadow:1px 1px 2px #000}
#stg{position:fixed;top:10px;right:10px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:100;user-select:none}
#pnl{position:fixed;top:60px;right:10px;width:240px;background:rgba(0,0,0,0.85);border-radius:10px;padding:15px;display:none;color:#fff;z-index:100;font-size:13px}
#pnl h3{margin-bottom:10px}
#pnl label{display:block;margin:8px 0}
#pnl input[type=range]{width:100%}
#pnl select{width:100%;padding:4px;border-radius:4px;background:#333;color:#fff;border:1px solid #555}
</style>
</head>
<body>
<div id="joy-zone"><div id="joy-base"><div id="joy-thumb"></div></div></div>
<div id="dpad"><div class="dbtn" id="du">▲</div><div class="dbtn" id="dd">▼</div><div class="dbtn" id="dl">◀</div><div class="dbtn" id="dr">▶</div></div>
<div id="act-m">MOUNT</div><div id="act-a">⚔</div><div id="act-s">🏃</div>
<div id="hp"><div id="hp-f"></div></div><div id="hp-t">HP: 100</div>
<div id="stg">⚙</div>
<div id="pnl">
<h3>Settings</h3>
<label>Controls <select id="cm"><option value="j">Joystick</option><option value="b">Buttons</option></select></label>
<label>Invert Controls: <input type="checkbox" id="inv"></label>
<label>Camera Speed: <input type="range" id="csen" min="1" max="10" value="4"></label>
<label>Camera Distance: <input type="range" id="cdst" min="8" max="30" value="16"></label>
<label>FOV: <input type="range" id="cfov" min="40" max="90" value="60"></label>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Динамические коллайдеры сущностей: обновляются каждый кадр
function updateCharCols(){
 COLS_CHAR.length=0;
 // Player
 COLS_CHAR.push({x:PL.g.position.x,z:PL.g.position.z,hw:.7,hd:.7,r:0});
 // NPCs
 for(const np of NPCS){if(!np.ra&&np.hp>0)COLS_CHAR.push({x:np.g.position.x,z:np.g.position.z,hw:.6,hd:.6,r:0})}
 // Horses
 for(const h of HORSES){if(!h.ra)COLS_CHAR.push({x:h.g.position.x,z:h.g.position.z,hw:1.2,hd:1.2,r:0})}
}
// Spring-damper: a = -k*(x-t) - d*v  -> возвращает ускорение
function spr(pos,target,vel,stiff,damp){return -stiff*(pos-target)-damp*vel}
// floorRay: получает Y поверхности под точкой (Raycast + Terrain)
function floorY(p){
 // Bug #3 fix: добавляем Raycaster с несколькими лучами и толщину земли 0.5м
 const RAY_OBJS=[GND,...TERRAIN_OBJS.filter(o=>o!==GND)];
 let bestY=-99;const offsets=[0,.3,-.3]; // Три луча для точности
 for(const ox of offsets){
  const o=p.clone();o.x+=ox;o.y+=1.5;
   const c=new THREE.Raycaster(o,new THREE.Vector3(0,-1,0),0,50);
  const hits=c.intersectObjects(RAY_OBJS);
  for(const h of hits){
   if(h.point.y>bestY)bestY=h.point.y;
  }
 }
 if(bestY>-90)return bestY+0.5; // +0.5м толщина земли чтобы кости не проскакивали
 // fallback: если нет попаданий, считаем по Box3 всех объектов
 let topY=-.5;
 for(const t of RAY_OBJS){const b=new THREE.Box3().setFromObject(t);if(p.x>=b.min.x&&p.x<=b.max.x&&p.z>=b.min.z&&p.z<=b.max.z&&b.max.y>topY)topY=b.max.y}
 return topY;
}
const TERRAIN_OBJS=[];

// ============ SCENE ============
const S=new THREE.Scene();S.background=new THREE.Color(0x87CEEB);S.fog=new THREE.FogExp2(0x87CEEB,0.002);
const C=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
const R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(R.domElement);
const AL=new THREE.AmbientLight(0xffffff,0.5);S.add(AL);
const DL=new THREE.DirectionalLight(0xffffff,0.85);
DL.position.set(120,180,100);DL.castShadow=true;
DL.shadow.camera.left=-300;DL.shadow.camera.right=300;
DL.shadow.camera.top=300;DL.shadow.camera.bottom=-300;
DL.shadow.mapSize.set(4096,4096);S.add(DL);

// ============ MATERIALS ============
const M=function(c){return new THREE.MeshLambertMaterial({color:c})};
const GM=M(0x4CAF50),RM=M(0x666666),RLM=M(0xFFFF00),SWM=M(0xCCCCCC);
const WM=M(0x87CEEB),DM=M(0x654321),TM=M(0x8B6914),PM=M(0x696969);
const WALLS=[M(0xDEB887),M(0xF5DEB3),M(0xBC8F8F),M(0xD2B48C),M(0xE6E6FA),M(0xF0E68C)];
const ROOFS=[M(0x8B4513),M(0xA0522D),M(0x696969),M(0x800000),M(0x2F4F4F)];
const SKIN=[M(0xFFDBB4),M(0xD2A679),M(0x8D5524)];const CLOTH=[M(0x4169E1),M(0xFF4500),M(0x2E8B57),M(0x9370DB)];
const LEGM=[M(0x2F4F4F),M(0x1C1C1C)];const HBM=[M(0x8B4513),M(0x1a0e07),M(0xF5F5F5),M(0xD2691E)];
const HEM=M(0),HEWM=M(0xFFFFFF),HMM=M(0x4A0000);const TLM=[M(0x228B22),M(0x32CD32),M(0x006400)];
const RLM2=new THREE.MeshLambertMaterial({color:0xFF0000,emissive:0xFF0000,emissiveIntensity:.5});
const YLM=new THREE.MeshLambertMaterial({color:0xFFFF00,emissive:0xFFFF00,emissiveIntensity:.5});
const GLM2=new THREE.MeshLambertMaterial({color:0x00FF00,emissive:0x00FF00,emissiveIntensity:.5});

// ============ GROUND ============
const GND=new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),GM);
GND.rotation.x=-Math.PI/2;GND.receiveShadow=true;S.add(GND);TERRAIN_OBJS.push(GND);

// ============ COLLISION SYSTEM ============
// Collision layers (concept): 
//   Layer 0: мир (земля, стены)
//   Layer 1: персонажи/NPC (обычное движение)
//   Layer 2: рагдол-кости (не коллайдят друг с другом — снижает провалы)
// В Three.js нет слоёв, поэтому реализуем через массивы коллайдеров:
const COLS_WORLD=[]; // стены, деревья, здания (Layer 0)
const COLS_CHAR=[]; // персонажи, NPC, лошади (Layer 1)  
// Layer 2 (рагдол) не нужен — кости не имеют отдельных коллайдеров

function colCheck(x,z,r){
 let rx=x,rz=z;
 // COLS_WORLD — только объекты мира (здания, деревья)
 for(const c of COLS_WORLD){
  const cs=Math.cos(c.r||0),sn=Math.sin(c.r||0);
  const dx=rx-c.x,dz=rz-c.z,lx=dx*cs+dz*sn,lz=-dx*sn+dz*cs;
  const hw=c.hw+r,hd=c.hd+r;
  if(Math.abs(lx)<hw&&Math.abs(lz)<hd){
   const ox=hw-Math.abs(lx),oz=hd-Math.abs(lz);
   if(ox<oz){const s=Math.sign(lx)||1;rx=c.x+s*hw*cs-lz*sn;rz=c.z+s*hw*sn+lz*cs}
   else{const s=Math.sign(lz)||1;rx=c.x+lx*cs-s*hd*sn;rz=c.z+lx*sn+s*hd*cs}
  }
 }
 return {x:rx,z:rz};
}

// ============ WORLD ============
function road(x,z,w,l,r){
 const o=new THREE.Mesh(new THREE.PlaneGeometry(w,l),RM);o.rotation.x=-Math.PI/2;o.rotation.z=r;o.position.set(x,.01,z);o.receiveShadow=true;S.add(o);
 const n=new THREE.Mesh(new THREE.PlaneGeometry(.3,l),RLM);n.rotation.x=-Math.PI/2;n.rotation.z=r;n.position.set(x,.02,z);S.add(n);
 const sw=new THREE.Mesh(new THREE.PlaneGeometry(w+5,l),SWM);sw.rotation.x=-Math.PI/2;sw.rotation.z=r;sw.position.set(x,.015,z);sw.receiveShadow=true;S.add(sw);
}
for(let i=-4;i<=4;i++){road(i*70,0,10,500,0);road(0,i*70,10,500,Math.PI/2)}

const BLDGS=[];
function bldg(x,z,w,d,h,st){
 const g=new THREE.Group(),m=WALLS[st%WALLS.length],rm=ROOFS[st%ROOFS.length];
 const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);b.position.y=h/2;b.castShadow=true;b.receiveShadow=true;g.add(b);
 const rf=new THREE.Mesh(new THREE.BoxGeometry(w+.8,.3,d+.8),rm);rf.position.y=h+.15;rf.castShadow=true;g.add(rf);
 const dr=new THREE.Mesh(new THREE.BoxGeometry(1.2,2,.12),DM);dr.position.set(0,1,d/2+.06);g.add(dr);
 for(let wy=0;wy<Math.floor(h/2);wy++){for(let wx=-1;wx<=1;wx+=2){const ww=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.08),WM);ww.position.set(wx*w/3,1.2+wy*1.8,d/2+.05);g.add(ww);const ww2=ww.clone();ww2.position.z=-d/2-.05;g.add(ww2)}}
 g.position.set(x,0,z);S.add(g);
 COLS_WORLD.push({x,z,hw:w/2+.5,hd:d/2+.5,r:0});BLDGS.push(g);
}
const SS=[];for(let i=0;i<50;i++)SS.push({w:5+Math.random()*7,d:4+Math.random()*6,h:3+Math.random()*4.5});
let si=0;
for(let bx=-240;bx<=240;bx+=70){for(let bz=-240;bz<=240;bz+=70){
 if(Math.abs(bx)<15&&Math.abs(bz)<15)continue;
 const off=25+Math.random()*12,s=bx+(Math.random()>.5?1:-1)*off,sz=bz+off;
 if(Math.abs(s)<8&&Math.abs(sz)<8)continue;
 const st=SS[si%SS.length];bldg(s,sz,st.w,st.d,st.h,si);si++;
}}

function tree(x,z){
 const g=new THREE.Group(),th=1.5+Math.random()*2.5;
 const tr=new THREE.Mesh(new THREE.CylinderGeometry(.12,.2,th,5),TM);tr.position.y=th/2;tr.castShadow=true;g.add(tr);
 const lm=TLM[Math.floor(Math.random()*3)],tt=Math.floor(Math.random()*3);
 if(tt===0){const lf=new THREE.Mesh(new THREE.SphereGeometry(1.2+Math.random()*.8,7,5),lm);lf.position.y=th+1;lf.castShadow=true;g.add(lf)}
 else if(tt===1){for(let i=0;i<3;i++){const lf=new THREE.Mesh(new THREE.ConeGeometry(1.1-i*.25,1.2,7),lm);lf.position.y=th+i*.8;lf.castShadow=true;g.add(lf)}}
 else{const lf=new THREE.Mesh(new THREE.BoxGeometry(2+Math.random(),2+Math.random(),2+Math.random()),lm);lf.position.y=th+1;lf.castShadow=true;g.add(lf)}
 g.position.set(x,0,z);S.add(g);COLS_WORLD.push({x,z,hw:.6,hd:.6,r:0})
}
for(let i=0;i<100;i++){let x=(Math.random()-.5)*500,z=(Math.random()-.5)*500,ok=true;for(const c of COLS_WORLD){if(Math.abs(x-c.x)<c.hw+2&&Math.abs(z-c.z)<c.hd+2){ok=false;break}}if(ok)tree(x,z)}

// lights
for(let i=-3;i<=3;i++){
 const p=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,6,5),PM);p.position.set(i*70+10,3,10);S.add(p);
 const l=new THREE.Mesh(new THREE.SphereGeometry(.25,6,6),new THREE.MeshLambertMaterial({color:0xFFFFCC,emissive:0xFFFFCC,emissiveIntensity:.2}));l.position.set(i*70+10,6.2,10);S.add(l);
}

// ============ CHARACTER ============
function mkChar(sk_i,cl_i,lg_i){
 const g=new THREE.Group(),sk=SKIN[sk_i%SKIN.length],cl=CLOTH[cl_i%CLOTH.length],lm=LEGM[lg_i%LEGM.length];
 const hd=new THREE.Mesh(new THREE.BoxGeometry(.5,.7,.5),sk);hd.position.y=2.2;hd.castShadow=true;g.add(hd);
 const e=new THREE.Mesh(new THREE.BoxGeometry(.1,.1,.05),HEM);e.position.set(-.12,2.25,.26);g.add(e);
 const e2=new THREE.Mesh(new THREE.BoxGeometry(.1,.1,.05),HEM);e2.position.set(.12,2.25,.26);g.add(e2);
 const bd=new THREE.Mesh(new THREE.BoxGeometry(.35,.9,.25),cl);bd.position.y=1.45;bd.castShadow=true;g.add(bd);
 const lag=new THREE.Group();const la=new THREE.Mesh(new THREE.BoxGeometry(.12,.7,.12),sk);la.position.y=-.35;lag.add(la);lag.position.set(-.28,1.75,0);g.add(lag);
 const rag=new THREE.Group();const ra=new THREE.Mesh(new THREE.BoxGeometry(.12,.7,.12),sk);ra.position.y=-.35;rag.add(ra);rag.position.set(.28,1.75,0);g.add(rag);
 const llg=new THREE.Group();const ll=new THREE.Mesh(new THREE.BoxGeometry(.15,.9,.15),lm);ll.position.y=-.45;llg.add(ll);llg.position.set(-.1,1,0);g.add(llg);
 const rlg=new THREE.Group();const rl=new THREE.Mesh(new THREE.BoxGeometry(.15,.9,.15),lm);rl.position.y=-.45;rlg.add(rl);rlg.position.set(.1,1,0);g.add(rlg);
 S.add(g);return{g,hd,bd,lag,rag,llg,rlg}
}
const PL=mkChar(0,0,0);PL.g.position.set(0,0,10);

// ============ HORSE ============
function mkHorse(ci){
 const g=new THREE.Group(),bm=HBM[ci%HBM.length];
 const bd=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,2.5),bm);bd.position.y=1.8;bd.castShadow=true;g.add(bd);
 const hd=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,1.2),bm);hd.position.set(0,2.5,1.6);hd.castShadow=true;g.add(hd);
 const jw=new THREE.Mesh(new THREE.BoxGeometry(.45,.15,.4),HMM);jw.position.set(0,2.1,2.25);g.add(jw);
 const ew1=new THREE.Mesh(new THREE.BoxGeometry(.35,.35,.08),HEWM);ew1.position.set(-.36,2.6,2.15);g.add(ew1);
 const ew2=new THREE.Mesh(new THREE.BoxGeometry(.35,.35,.08),HEWM);ew2.position.set(.36,2.6,2.15);g.add(ew2);
 const ep1=new THREE.Mesh(new THREE.BoxGeometry(.15,.15,.09),HEM);ep1.position.set(-.36,2.6,2.19);g.add(ep1);
 const ep2=new THREE.Mesh(new THREE.BoxGeometry(.15,.15,.09),HEM);ep2.position.set(.36,2.6,2.19);g.add(ep2);
 const tl=new THREE.Mesh(new THREE.BoxGeometry(.15,.15,.8),M(0x2F1B0E));tl.position.set(0,1.9,-1.5);tl.rotation.x=.3;g.add(tl);
 const lgs=[];for(const p of[{x:-.4,z:.9},{x:.4,z:.9},{x:-.4,z:-.9},{x:.4,z:-.9}]){
  const lg=new THREE.Group();const l=new THREE.Mesh(new THREE.BoxGeometry(.3,1.8,.3),M(0x654321));l.position.y=-.9;lg.add(l);lg.position.set(p.x,1.2,p.z);g.add(lg);lgs.push(lg);
 }
 S.add(g);return{g,bd,hd,jw,ew1,ew2,ep1,ep2,tl,lgs}
}
const MH=mkHorse(0);MH.g.position.set(0,0,20);
const HORSES=[{...MH,m:true,s:0,wc:0,rider:null,ra:false,rtimer:0,rb:null,rp:'f',ron:false,rtime:0,aim:null,ait:0,gv:null}];
for(let i=1;i<6;i++){const h=mkHorse(i);h.g.position.set((Math.random()-.5)*120,0,(Math.random()-.5)*120);h.g.rotation.y=Math.random()*Math.PI*2;HORSES.push({...h,m:false,s:0,wc:0,rider:null,ra:false,rtimer:0,rb:null,rp:'f',ron:false,rtime:0,aim:null,ait:0})}

// ============ NPCs ============
const NPCS=[];
for(let i=0;i<50;i++){
 const np=mkChar(Math.floor(Math.random()*3),Math.floor(Math.random()*4),Math.floor(Math.random()*2));
 let nx,nz,ok;do{nx=(Math.random()-.5)*300;nz=(Math.random()-.5)*300;ok=true;for(const c of COLS_WORLD){if(Math.abs(nx-c.x)<c.hw+1&&Math.abs(nz-c.z)<c.hd+1){ok=false;break}}}while(!ok);
 np.g.position.set(nx,0,nz);np.g.rotation.y=Math.random()*Math.PI*2;
 NPCS.push({...np,hp:100,sp:0,rt:np.g.rotation.y,wc:0,ait:Math.random()*5,ais:'idle',aim:null,ra:false,rtimer:0,rb:null,rp:'f',ron:false,rtime:0,host:false,anger:0,rider:null,
  ls:{hd:mkLS(),bd:mkLS(),la:mkLS(),ra:mkLS(),ll:mkLS(),rl:mkLS()}});
}

function mkLS(){return{rx:0,rz:0,vx:0,vz:0,tx:0,tz:0}}

// ============ ACTIVE RAGDOLL SYSTEM ============
// Каждая конечность — пружина: a = -stiff*(pos-target) - damp*vel
// Защитная поза: руки к лицу, ноги согнуты, голова вниз
// RagdollStabilizer: LateUpdate проверяет Y < floorY + threshold -> поднимает
// AutoFixFloorPenetration: при активации выравнивает корень по нормали

function startRagdoll(ch,sp,rot){
 ch.ra=true;ch.rtimer=5;ch.rp='f';ch.ron=false;ch.rtime=0;
 if(!ch.ls){ch.ls={hd:mkLS(),bd:mkLS(),la:mkLS(),ra:mkLS(),ll:mkLS(),rl:mkLS()}}
 const imp=Math.min(Math.abs(sp),.8);
 ch.rb={g:ch.g||ch,v:new THREE.Vector3(Math.sin(rot)*imp*.5,.2+imp*.35,Math.cos(rot)*imp*.5),
   rv:new THREE.Vector3(-.08-imp*.22,(Math.random()-.5)*.08,(Math.random()-.5)*.06)};
 if(ch.hd){
  // Разлёт конечностей при ударе (случайные скорости)
  const ls=ch.ls;[ls.la,ls.ra,ls.ll,ls.rl,ls.hd,ls.bd].forEach(l=>{l.vx=(Math.random()-.5)*8;l.vz=(Math.random()-.5)*5});
  // Защитная поза (target): руки вперёд, ноги согнуты
  ls.la.tx=-.8;ls.la.tz=-.5;ls.ra.tx=-.8;ls.ra.tz=.5;
  ls.ll.tx=.3;ls.ll.tz=(Math.random()-.5)*.2;ls.rl.tx=.3;ls.rl.tz=(Math.random()-.5)*.2;
  ls.hd.tx=.4;ls.hd.tz=(Math.random()-.5)*.2;ls.bd.tx=.2;ls.bd.tz=(Math.random()-.5)*.1;
 }
}

// ActiveRagdoll: обновление физики конечностей через spring-damper
function updRagdollPhys(ch,delta){
 if(!ch.ra||!ch.hd)return;
 ch.rtimer-=delta;ch.rtime+=delta;
 let fy=0;

 // === RAGDOLL STABILIZER: защита от провала в пол ===
 if(ch.rb){
  ch.rb.g.position.add(ch.rb.v);
  ch.rb.v.y-=.018; // gravity
  // Пол: проверяем ПОСЛЕ обновления позиции
  fy=floorY(ch.rb.g.position);
  if(ch.rb.g.position.y<fy+.15){
   ch.rb.g.position.y=fy+.2;ch.rb.v.y=0;
   ch.rb.v.x*=.88;ch.rb.v.z*=.88;ch.rb.rv.multiplyScalar(.7);
   if(!ch.ron){
    ch.ron=true;ch.rp='s';
    ch.rb.rv.x+=(Math.random()-.5)*.2;ch.rb.rv.z+=(Math.random()-.5)*.15;
    // Ground spread: конечности разлетаются при касании земли
    if(ch.ls){[ch.ls.la,ch.ls.ra,ch.ls.ll,ch.ls.rl].forEach(l=>{l.vx+=(Math.random()-.5)*5;l.vz+=(Math.random()-.5)*3})}
   }
  }
  // Абсолютная защита: если всё же ниже земли
  if(ch.rb.g.position.y<-0.5)ch.rb.g.position.y=0.5;
  ch.rb.g.rotation.x+=ch.rb.rv.x;ch.rb.g.rotation.y+=ch.rb.rv.y;ch.rb.g.rotation.z+=ch.rb.rv.z;
  ch.rb.rv.multiplyScalar(.96);
  const cc=colCheck(ch.rb.g.position.x,ch.rb.g.position.z,ch.m?1.5:.5);
  if(cc.hit||(cc.x!==ch.rb.g.position.x||cc.z!==ch.rb.g.position.z)){
   const hit=cc.hit||true;
   if(hit){ch.rb.g.position.x=cc.x;ch.rb.g.position.z=cc.z;ch.rb.v.x*=.2;ch.rb.v.z*=.2;ch.rb.rv.x+=(Math.random()-.5)*.08;ch.rb.rv.z+=(Math.random()-.5)*.06}
  }
 }

 // === ACTIVE RAGDOLL: spring-damper for each limb ===
 const fd=Math.max(.1,ch.ron?1-ch.rtime*.3:1);
 const st=18,da=3.5;

 function upLimb(ls,obj,useZ){
  const tx=ls.tx*fd,tz=ls.tz*fd;
  const ax=spr(ls.rx,tx,ls.vx,st,da);
  const az=useZ?spr(ls.rz,tz,ls.vz,st,da):0;
  ls.vx+=ax*delta;ls.vz+=az*delta;
  ls.vx*=.97;ls.vz*=.97;
  ls.rx+=ls.vx*delta;ls.rz+=ls.vz*delta;
  if(obj){obj.rotation.x=ls.rx;obj.rotation.z=ls.rz}
 }
 upLimb(ch.ls.hd,ch.hd,true);upLimb(ch.ls.bd,ch.bd,true);
 upLimb(ch.ls.la,ch.lag,true);upLimb(ch.ls.ra,ch.rag,true);
 upLimb(ch.ls.ll,ch.llg,true);upLimb(ch.ls.rl,ch.rlg,true);

 if(ch.rtimer<=0&&ch.rp!=='g'){ch.rp='g';ch.rtimer=3}
 // === AUTO-FIX FLOOR PENETRATION: при входе в gettingup выравниваем ===
 if(ch.rp==='g'){
  const t=Math.min((3-ch.rtimer)/3,1),e=t*t*(3-2*t);

   ['hd','bd','la','ra','ll','rl'].forEach(k=>{const l=ch.ls[k];l.rx*=(1-e*.9);l.rz*=(1-e*.9);l.vx*=.9;l.vz*=.9});
   ch.hd.rotation.x=ch.ls.hd.rx;ch.hd.rotation.z=ch.ls.hd.rz;

   }
  }

let RDA=false,RDT=0,RDB=null,RDCB=null,RDPH='f',RDON=false,RDCON=false,RDTM=0;

function horseRagdoll(sp,rot,hr=null){
 RDA=true;RDT=5;RDPH='f';RDON=false;RDCON=false;RDTM=0;
 const imp=Math.min(Math.abs(sp),.7);

 // Выбрасываем NPC-наездника

 // Главный герой слетает с лошади. ВАЖНО: сбрасываем позиции частей тела
 // из верховой позы обратно в стоячую, иначе персонаж скрюченный (баг #1)
 PL.g.visible=true;PL.g.position.copy(h.g.position);PL.g.position.y=1.8;
 PL.g.rotation.set(0,rot+Math.PI>Math.PI?rot+Math.PI-Math.PI*2:rot+Math.PI,0);
 PL.hd.position.set(0,2.2,0);PL.bd.position.set(0,1.45,0);

 PL.lag.rotation.set(0,0,0);PL.rag.rotation.set(0,0,0);

 if(!PL.ls)PL.ls={hd:mkLS(),bd:mkLS(),la:mkLS(),ra:mkLS(),ll:mkLS(),rl:mkLS()};
 RDCB={v:new THREE.Vector3(Math.sin(rot)*imp*.5+(Math.random()-.5)*.1,.3+imp*.4,Math.cos(rot)*imp*.5+(Math.random()-.5)*.1),rv:new THREE.Vector3(-.08-imp*.25,(Math.random()-.5)*.12,(Math.random()-.5)*.08)};
 // Параметры защитной позы для вылета - мягкая, не скрученная
 const ls=PL.ls;[ls.la,ls.ra,ls.ll,ls.rl,ls.hd,ls.bd].forEach(l=>{l.vx=(Math.random()-.5)*6;l.vz=(Math.random()-.5)*4});
 ls.la.tx=-.3;ls.la.tz=-.3;ls.ra.tx=-.3;ls.ra.tz=.3;
 ls.ll.tx=.15;ls.ll.tz=(Math.random()-.5)*.1;ls.rl.tx=.15;ls.rl.tz=(Math.random()-.5)*.1;
 ls.hd.tx=.1;ls.hd.tz=(Math.random()-.5)*.1;ls.bd.tx=.05;ls.bd.tz=(Math.random()-.5)*.05;
 // Применяем начальные rotation (сохраняем естественную позу)
 PL.ls.hd.rx=.1;PL.ls.bd.rx=.05;
 PL.ls.la.rx=-.3;PL.ls.ra.rx=-.3;
 PL.ls.ll.rx=.15;PL.ls.rl.rx=.15;
}

function updRagdoll(delta){

 if(RDPH==='f'||RDPH==='s'){
  if(RDB){
   RDB.v.y-=.018;RDB.g.position.add(RDB.v);
   const fy2=floorY(RDB.g.position);
   if(RDB.g.position.y<fy2+.15){RDB.g.position.y=fy2+.2;RDB.v.y=0;RDB.v.x*=.88;RDB.v.z*=.88;RDB.rv.multiplyScalar(.7);if(!RDON){RDON=true;RDPH='s';RDB.rv.x+=(Math.random()-.5)*.15;RDB.rv.z+=(Math.random()-.5)*.1}}
   RDB.g.rotation.x+=RDB.rv.x;RDB.g.rotation.y+=RDB.rv.y;RDB.g.rotation.z+=RDB.rv.z;RDB.rv.multiplyScalar(.96);

   if(cc.x!==RDB.g.position.x||cc.z!==RDB.g.position.z){RDB.g.position.x=cc.x;RDB.g.position.z=cc.z;RDB.v.x*=.2;RDB.v.z*=.2;RDB.rv.x+=(Math.random()-.5)*.08;RDB.rv.z+=(Math.random()-.5)*.06}
  }

  if(RDCB&&PL.ls){
   RDCB.v.y-=.018;PL.g.position.add(RDCB.v);
   const fy=floorY(PL.g.position);
   if(PL.g.position.y<fy+.15){PL.g.position.y=fy+.2;RDCB.v.y=0;RDCB.v.x*=.88;RDCB.v.z*=.88;RDCB.rv.multiplyScalar(.7);if(!RDCON){RDCON=true;RDCB.rv.x+=(Math.random()-.5)*.2;RDCB.rv.z+=(Math.random()-.5)*.15;[PL.ls.la,PL.ls.ra,PL.ls.ll,PL.ls.rl].forEach(l=>{l.vx+=(Math.random()-.5)*5;l.vz+=(Math.random()-.5)*3})}}
   PL.g.rotation.x+=RDCB.rv.x;PL.g.rotation.y+=RDCB.rv.y;PL.g.rotation.z+=RDCB.rv.z;RDCB.rv.multiplyScalar(.96);
   const cc=colCheck(PL.g.position.x,PL.g.position.z,.5);
   if(cc.x!==PL.g.position.x||cc.z!==PL.g.position.z){PL.g.position.x=cc.x;PL.g.position.z=cc.z;RDCB.v.x*=.2;RDCB.v.z*=.2;RDCB.rv.x+=(Math.random()-.5)*.08;RDCB.rv.z+=(Math.random()-.5)*.06}
   // Абсолютная защита: если всё же ниже земли
   if(PL.g.position.y<-0.5)PL.g.position.y=0.5;
   const fd=Math.max(.1,RDCON?1-RDTM*.3:1),st=18,da=3.5;
   function ul(ls,o,z){const tx=ls.tx*fd,tz=ls.tz*fd;const ax=spr(ls.rx,tx,ls.vx,st,da),az=z?spr(ls.rz,tz,ls.vz,st,da):0;ls.vx+=ax*delta;ls.vz+=az*delta;ls.vx*=.97;ls.vz*=.97;ls.rx+=ls.vx*delta;ls.rz+=ls.vz*delta;if(o){o.rotation.x=ls.rx;o.rotation.z=ls.rz}}
   ul(PL.ls.hd,PL.hd,true);ul(PL.ls.bd,PL.bd,true);ul(PL.ls.la,PL.lag,true);ul(PL.ls.ra,PL.rag,true);ul(PL.ls.ll,PL.llg,true);ul(PL.ls.rl,PL.rlg,true);
  }
  if(RDT<=0){RDPH='g';RDT=3;isRiding=false;curHorse=null}
 }else if(RDPH==='g'){
  RDT-=delta;const t=Math.min((3-RDT)/3,1),e=t*t*(3-2*t);
  if(RDB){RDB.g.rotation.x*=(1-e*.95);RDB.g.rotation.z*=(1-e*.95);RDB.g.position.y=e*.5;RDB.v.x*=.92;RDB.v.z*=.92}
  if(RDCB){RDCB.rv.multiplyScalar(.92)}
  const p=PL;
  if(p.ls){['hd','bd','la','ra','ll','rl'].forEach(k=>{const l=p.ls[k];l.rx*=(1-e*.9);l.rz*=(1-e*.9);l.vx*=.9;l.vz*=.9});p.hd.rotation.x=p.ls.hd.rx;p.hd.rotation.z=p.ls.hd.rz;p.bd.rotation.x=p.ls.bd.rx;p.bd.rotation.z=p.ls.bd.rz;p.lag.rotation.x=p.ls.la.rx;p.lag.rotation.z=p.ls.la.rz;p.rag.rotation.x=p.ls.ra.rx;p.rag.rotation.z=p.ls.ra.rz;p.llg.rotation.x=p.ls.ll.rx;p.llg.rotation.z=p.ls.ll.rz;p.rlg.rotation.x=p.ls.rl.rx;p.rlg.rotation.z=p.ls.rl.rz}
  if(RDT<=0){
   RDA=false;RDPH='f';RDTM=0;isRiding=false;curHorse=null;
   const fy_end=floorY(PL.g.position);
   p.g.visible=true;p.g.position.y=fy_end>.1?fy_end:0;
   p.hd.rotation.set(0,0,0);p.bd.rotation.set(0,0,0);p.lag.rotation.set(0,0,0);p.rag.rotation.set(0,0,0);p.llg.rotation.set(0,0,0);p.rlg.rotation.set(0,0,0);
   p.bd.position.set(0,1.45,0);p.hd.position.set(0,2.2,0);p.lag.position.set(-.28,1.75,0);p.rag.position.set(.28,1.75,0);p.llg.position.set(-.1,1,0);p.rlg.position.set(.1,1,0);
   hp=Math.max(0,hp-20);RDB=null;RDCB=null;RDON=false;RDCON=false;
  }
 }
}

function toggleRiding(){
 if(RDA||mp>0||isD)return;
 if(isRiding&&curHorse&&mp===0&&!isD){isD=true;dt=0;document.getElementById('act-m').textContent='...';return}
 let near=null,nd=3;
 for(const h of HORSES){const d=PL.g.position.distanceTo(h.g.position);if(d<nd&&!h.ra&&!h.rider){nd=d;near=h}}
 if(!near||isRiding)return;
 curHorse=near;mp=1;mt=0;hwc=0;pwc=0;
 document.getElementById('act-m').textContent='...';
}

function doAttack(){
 if(RDA||mp>0||isD)return;
 const t=isRiding&&curHorse?curHorse.g:PL.g;
 for(const np of NPCS){
  if(np.ra||np.hp<=0)continue;
  if(t.position.distanceTo(np.g.position)<3.5){
   np.hp-=20;if(np.hp<=0){np.g.visible=false;np.hp=0}
   else{np.host=true;np.anger=10;startRagdoll(np,.3,Math.atan2(np.g.position.x-t.position.x,np.g.position.z-t.position.z))}
  }
 }
 for(const h2 of HORSES){if(h2===curHorse||h2.ra)continue;if(t.position.distanceTo(h2.g.position)<3.5){h2.ra=true;h2.rtimer=4;h2.rp='f';h2.ron=false;h2.rtime=0;h2.rb={g:h2.g,v:new THREE.Vector3(Math.sin(Math.atan2(h2.g.position.x-t.position.x,h2.g.position.z-t.position.z))*.25,.15,Math.cos(Math.atan2(h2.g.position.x-t.position.x,h2.g.position.z-t.position.z))*.25),rv:new THREE.Vector3(-.03-.12,(Math.random()-.5)*.05,(Math.random()-.5)*.03)};h2.hd.rotation.set(0,0,0);h2.jw&&(h2.jw.rotation.set(0,0,0));h2.tl&&h2.tl.rotation.set(.3,0,0);h2.lgs.forEach(l=>l.rotation.set(0,0,0));if(h2.rider){const np2=h2.rider;np2.rider=null;h2.rider=null;np2.g.visible=true;np2.g.position.copy(h2.g.position);np2.g.position.y=1.5;startRagdoll(np2,.3,0)}}}
}

document.addEventListener('mousemove',e=>{if(!isDrag)return;camAngX-=(e.clientX-lastM.x)*camSen*2;camAngY=Math.max(.1,Math.min(1.2,camAngY+(e.clientY-lastM.y)*camSen));lastM={x:e.clientX,y:e.clientY}});
document.addEventListener('mouseup',()=>{isDrag=false;camRet=0});
document.addEventListener('touchstart',e=>{if(e.target.closest('#joy-zone')||e.target.closest('#dpad')||e.target.closest('#act-m')||e.target.closest('#act-a')||e.target.closest('#act-s')||e.target.closest('#stg')||e.target.closest('#pnl'))return;if(e.touches.length===1){isDrag=true;lastM={x:e.touches[0].clientX,y:e.touches[0].clientY};camRet=0}},{passive:false});
document.addEventListener('touchmove',e=>{if(!isDrag||e.touches.length!==1)return;camAngX-=(e.touches[0].clientX-lastM.x)*camSen*2;camAngY=Math.max(.1,Math.min(1.2,camAngY+(e.touches[0].clientY-lastM.y)*camSen));lastM={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:false});
document.addEventListener('touchend',()=>{isDrag=false;camRet=0});

// ============ GAME LOOP ============
const CK=new THREE.Clock();

function animate(){
 requestAnimationFrame(animate);
 const d=Math.min(CK.getDelta(),.05);
 const sprint=K.sprint?2:1;

 updateMounting(d);
 updRagdoll(d);
 for(const np of NPCS)updRagdollPhys(np,d);

 if(RDA){
  const tt=RDB?RDB.g:PL.g;
  C.position.x+=(tt.position.x-Math.sin(hRot)*camDist-C.position.x)*.05;
  C.position.z+=(tt.position.z-Math.cos(hRot)*camDist-C.position.z)*.05;
  C.position.y+=(Math.max(8,tt.position.y+10)-C.position.y)*.05;
  C.lookAt(tt.position.x,Math.max(1,tt.position.y+1),tt.position.z);R.render(S,C);return
 }

 // === CONTROLS: camera-relative (джойстик вверх = от камеры) ===
 let mx=0,my=0;
 if(JK.a){
  mx=Math.abs(JK.dx)>.05?JK.dx:0;
  my=Math.abs(JK.dy)>.05?-JK.dy:0;
 }else{
  mx=K.d?1:K.a?-1:0;
  my=K.w?1:K.s?-1:0;
 }
 const inv=invertC?-1:1;mx*=inv;my*=inv;
  const isMv=Math.abs(mx)>.05||Math.abs(my)>.05;
  if(isMv){
   if(isRiding&&curHorse){
     hRot-=mx*2.5*d;
     if(my>0)hSp=Math.min(hSp+my*.01*sprint,.35*sprint);
     else if(my<0)hSp=Math.max(hSp+my*.01*sprint,-.35*sprint);
    }else{
     pRot-=mx*2.5*d;
    if(my>0)pSp=Math.min(pSp+my*.005*sprint,.12*sprint);
    else if(my<0)pSp=Math.max(pSp+my*.005*sprint,-.12*sprint);
   }
  }else{if(isRiding)hSp*=.96;else pSp*=.92}
  if(isRiding)hSp=Math.max(-.35*sprint,Math.min(.35*sprint,hSp));else pSp=Math.max(-.12*sprint,Math.min(.12*sprint,pSp));

 // === MOUNT CONTROLLER: движение ===
 if(isRiding&&curHorse&&mp===0&&!isD){
  const nx=curHorse.g.position.x+Math.sin(hRot)*hSp,nz=curHorse.g.position.z+Math.cos(hRot)*hSp;
  const r2=colCheck(nx,nz,1.5);
  curHorse.g.position.x=r2.x;curHorse.g.position.z=r2.z;
  // MOUNT CONTROLLER: столкновение на скорости > threshold → слетает
  if((r2.x!==nx||r2.z!==nz)&&Math.abs(hSp)>.15){
   // Импульс: скорость лошади * 1.2 + Vector3.up * 2 (отделение от лошади)
   horseRagdoll(hSp,hRot,curHorse);
   // Выбрасываем NPC-наездника если был
   if(curHorse.rider&&curHorse.rider!==PL){const np=curHorse.rider;np.rider=null;curHorse.rider=null;np.g.visible=true;np.g.position.copy(curHorse.g.position);np.g.position.y=1.5;startRagdoll(np,Math.abs(hSp),hRot)}
   // Лошадь не останавливается резко — получает импульс и затухает
   curHorse.gv=new THREE.Vector3(Math.sin(hRot)*Math.abs(hSp),0,Math.cos(hRot)*Math.abs(hSp));
   pSp=0;isRiding=false;
  }
  // Сбивание NPC на скорости
  if(Math.abs(hSp)>.08){for(const np of NPCS){if(np.ra||np.hp<=0)continue;if(curHorse.g.position.distanceTo(np.g.position)<2.5){np.hp-=25;np.host=true;np.anger=10;startRagdoll(np,Math.abs(hSp),hRot);hSp*=.7;if(np.hp<=0)np.g.visible=false}}}
  curHorse.g.rotation.y=hRot;
  if(Math.abs(hSp)>.01){hwc+=hSp;curHorse.lgs.forEach(l=>l.rotation.x=hwc);hhb+=hSp*2;curHorse.hd.position.z=1.6+Math.sin(hhb)*.08;curHorse.hd.position.y=2.5+Math.sin(hhb*.5)*.04}
  else{curHorse.lgs.forEach(l=>l.rotation.x*=.9);curHorse.hd.position.z+=(1.6-curHorse.hd.position.z)*.08;curHorse.hd.position.y+=(2.5-curHorse.hd.position.y)*.08}
  PL.g.position.set(curHorse.g.position.x,1.3,curHorse.g.position.z);PL.g.rotation.y=hRot;
  PL.hd.position.set(0,.9,-1.4);PL.bd.position.set(0,.5,0);PL.lag.position.set(-.28,.5,0);PL.rag.position.set(.28,.5,0);PL.llg.position.set(-.1,0,0);PL.rlg.position.set(.1,0,0);
 }else if(!isRiding&&mp===0&&!isD){
  const nx=PL.g.position.x+Math.sin(pRot)*pSp,nz=PL.g.position.z+Math.cos(pRot)*pSp;
  const r2=colCheck(nx,nz,.5);
  PL.g.position.x=r2.x;PL.g.position.z=r2.z;
  if((r2.x!==nx||r2.z!==nz)&&Math.abs(pSp)>.08){startRagdoll(PL,Math.abs(pSp),pRot);pSp=0}
  for(const np of NPCS){if(np.ra||np.hp<=0)continue;if(PL.g.position.distanceTo(np.g.position)<.8){const a=Math.atan2(PL.g.position.x-np.g.position.x,PL.g.position.z-np.g.position.z);PL.g.position.x+=Math.sin(a)*.02;PL.g.position.z+=Math.cos(a)*.02}}
  for(const h2 of HORSES){if(h2.ra||h2===curHorse)continue;if(PL.g.position.distanceTo(h2.g.position)<1.5){const a=Math.atan2(PL.g.position.x-h2.g.position.x,PL.g.position.z-h2.g.position.z);PL.g.position.x+=Math.sin(a)*.05;PL.g.position.z+=Math.cos(a)*.05}}
  PL.g.rotation.y=pRot;
  if(Math.abs(pSp)>.01){pwc+=Math.abs(pSp)*4*sprint;const la=Math.sin(pwc)*.4,aa=-Math.sin(pwc)*.3;PL.llg.rotation.x=la;PL.rlg.rotation.x=-la;PL.lag.rotation.x=aa;PL.rag.rotation.x=-aa}
  else{pwc=0;PL.llg.rotation.x*=.9;PL.rlg.rotation.x*=.9;PL.lag.rotation.x*=.9;PL.rag.rotation.x*=.9}
 }

 // === NPC AI ===
 for(const np of NPCS){
  if(np.hp<=0||np.ra)continue;
  if(np.rider){const hrk=np.rider;if(hrk.ra||hrk.g.position.y<-1){np.rider=null;np.g.visible=true;np.g.position.set(hrk.g.position.x,0,hrk.g.position.z);continue}
   np.g.position.set(hrk.g.position.x,1.3,hrk.g.position.z);np.g.rotation.y=hrk.g.rotation.y;np.hd.position.set(0,.9,-1.4);np.bd.position.set(0,.5,0);np.lag.position.set(-.28,.5,0);np.rag.position.set(.28,.5,0);np.llg.position.set(-.1,0,0);np.rlg.position.set(.1,0,0);np.sp=0;np.wc=0;continue}
  // mount horse
  if(Math.random()<.002&&np.ais==='walk'){for(const h2 of HORSES){if(h2.m||h2.ra||h2.rider)continue;if(np.g.position.distanceTo(h2.g.position)<4){h2.rider=np;np.rider=h2;np.g.visible=false;break}}}
  for(const np2 of NPCS){if(np2===np||np2.ra||np2.hp<=0)continue;if(np.g.position.distanceTo(np2.g.position)<.8){const a=Math.atan2(np.g.position.x-np2.g.position.x,np.g.position.z-np2.g.position.z);np.g.position.x+=Math.sin(a)*.01;np.g.position.z+=Math.cos(a)*.01}}
  for(const h2 of HORSES){if(h2.ra)continue;if(np.g.position.distanceTo(h2.g.position)<1.5){const a=Math.atan2(np.g.position.x-h2.g.position.x,np.g.position.z-h2.g.position.z);np.g.position.x+=Math.sin(a)*.02;np.g.position.z+=Math.cos(a)*.02}}
  np.ait-=d;
  if(np.ait<=0){np.ait=2+Math.random()*4;np.ais=Math.random()>.3?'walk':'idle';if(np.ais==='walk')np.aim={x:np.g.position.x+(Math.random()-.5)*30,z:np.g.position.z+(Math.random()-.5)*30}}
  if(np.host&&np.anger>0){
   np.anger-=d;if(np.anger<=0)np.host=false;
   const tar=isRiding&&curHorse?curHorse.g:PL.g;const dx=tar.position.x-np.g.position.x,dz=tar.position.z-np.g.position.z;const dist=Math.sqrt(dx*dx+dz*dz);
   if(dist>2&&dist<25){np.rt=Math.atan2(dx,dz);np.sp=.04;const nnx=np.g.position.x+Math.sin(np.rt)*np.sp,nnz=np.g.position.z+Math.cos(np.rt)*np.sp;const r3=colCheck(nnx,nnz,.5);np.g.position.x=r3.x;np.g.position.z=r3.z;np.wc+=np.sp*5;const la=Math.sin(np.wc)*.5,aa=-Math.sin(np.wc)*.4;np.llg.rotation.x=la;np.rlg.rotation.x=-la;np.lag.rotation.x=aa;np.rag.rotation.x=-aa;np.g.rotation.y=np.rt}
   else if(dist<=2&&np.ait<=0){np.ait=0.5;hp=Math.max(0,hp-5);if(hp<=0){horseRagdoll(0.3,0,curHorse);isRiding=false;curHorse=null}for(const np2 of NPCS){if(np2===np||np2.ra||np2.hp<=0)continue;if(np2.g.position.distanceTo(np.g.position)<15){np2.host=true;np2.anger=10}}}
  }else if(np.ais==='walk'&&np.aim){const dx=np.aim.x-np.g.position.x,dz=np.aim.z-np.g.position.z;if(Math.sqrt(dx*dx+dz*dz)>1){np.rt=Math.atan2(dx,dz);np.sp=.025;const nnx=np.g.position.x+Math.sin(np.rt)*np.sp,nnz=np.g.position.z+Math.cos(np.rt)*np.sp;const r3=colCheck(nnx,nnz,.5);np.g.position.x=r3.x;np.g.position.z=r3.z;np.wc+=np.sp*4;const la=Math.sin(np.wc)*.4,aa=-Math.sin(np.wc)*.3;np.llg.rotation.x=la;np.rlg.rotation.x=-la;np.lag.rotation.x=aa;np.rag.rotation.x=-aa;np.g.rotation.y=np.rt}else{np.sp=0;np.wc=0;np.llg.rotation.x*=.9;np.rlg.rotation.x*=.9;np.lag.rotation.x*=.9;np.rag.rotation.x*=.9}
  }else{np.sp=0;np.wc=0;np.llg.rotation.x*=.9;np.rlg.rotation.x*=.9;np.lag.rotation.x*=.9;np.rag.rotation.x*=.9}
 }

 // AI HORSE MOMENTUM (для всех лошадей после вылета)
 for(const hm of HORSES){
  if(!hm.gv||hm.ra)continue;
  hm.gv.x*=.97;hm.gv.z*=.97;
  hm.g.position.x+=hm.gv.x;hm.g.position.z+=hm.gv.z;
  const cc=colCheck(hm.g.position.x,hm.g.position.z,1.5);
  if(cc.x!==hm.g.position.x||cc.z!==hm.g.position.z){hm.g.position.x=cc.x;hm.g.position.z=cc.z;hm.gv.x*=.5;hm.gv.z*=.5}
  if(Math.abs(hm.gv.x)+Math.abs(hm.gv.z)<.001)hm.gv=null;
  if(hm.gv){hm.wc+=hm.gv.length();hm.lgs.forEach(l=>l.rotation.x=hm.wc)}
 }
 // === AI HORSES ===
 for(const h2 of HORSES){
  if(h2.m||h2.ra)continue;
  for(const h3 of HORSES){if(h3===h2||h3.ra)continue;if(h2.g.position.distanceTo(h3.g.position)<2.5){const a=Math.atan2(h2.g.position.x-h3.g.position.x,h2.g.position.z-h3.g.position.z);h2.g.position.x+=Math.sin(a)*.03;h2.g.position.z+=Math.cos(a)*.03}}
  for(const np of NPCS){if(np.ra||np.hp<=0||np.rider)continue;if(h2.g.position.distanceTo(np.g.position)<2){const a=Math.atan2(h2.g.position.x-np.g.position.x,h2.g.position.z-np.g.position.z);h2.g.position.x+=Math.sin(a)*.03;h2.g.position.z+=Math.cos(a)*.03}}
  if(h2.rider){const np=h2.rider;np.g.position.set(h2.g.position.x,1.3,h2.g.position.z);np.g.rotation.y=h2.g.rotation.y;np.hd.position.set(0,.9,-1.4);np.bd.position.set(0,.5,0);np.lag.position.set(-.28,.5,0);np.rag.position.set(.28,.5,0);np.llg.position.set(-.1,0,0);np.rlg.position.set(.1,0,0)}
  // AI horse ragdoll
  if(h2.ra){h2.rtimer-=d;h2.rtime+=d;const gr=.018,gf=.9;if(h2.rp==='f'||h2.rp==='s'){const fd=h2.ron?Math.max(0,1-h2.rtime*.5):1;if(h2.rb){h2.rb.v.y-=gr;h2.rb.g.position.add(h2.rb.v);const fy2=floorY(h2.rb.g.position);if(h2.rb.g.position.y<fy2+.15){h2.rb.g.position.y=fy2+.2;h2.rb.v.y=0;h2.rb.v.x*=gf;h2.rb.v.z*=gf;h2.rb.rv.multiplyScalar(.7);if(!h2.ron){h2.ron=true;h2.rp='s';h2.rb.rv.x+=(Math.random()-.5)*.15;h2.rb.rv.z+=(Math.random()-.5)*.1}}h2.rb.g.rotation.x+=h2.rb.rv.x;h2.rb.g.rotation.y+=h2.rb.rv.y;h2.rb.g.rotation.z+=h2.rb.rv.z;h2.rb.rv.multiplyScalar(.95);const cc=colCheck(h2.rb.g.position.x,h2.rb.g.position.z,1.5);if(cc.x!==h2.rb.g.position.x||cc.z!==h2.rb.g.position.z){h2.rb.g.position.x=cc.x;h2.rb.g.position.z=cc.z;h2.rb.v.x*=.2;h2.rb.v.z*=.2;h2.rb.rv.x+=(Math.random()-.5)*.08;h2.rb.rv.z+=(Math.random()-.5)*.06}}if(h2.rtimer<=0){h2.rp='g';h2.rtimer=2.5}}else if(h2.rp==='g'){h2.rtimer-=d;const t=Math.min((2.5-h2.rtimer)/2.5,1),e=t*t*(3-2*t);if(h2.rb){h2.rb.g.rotation.x*=(1-e*.95);h2.rb.g.rotation.z*=(1-e*.95);h2.rb.g.position.y=e*.5}if(h2.rtimer<=0){h2.ra=false;h2.g.position.y=0;h2.g.rotation.set(0,h2.g.rotation.y,0);h2.hd.rotation.set(0,0,0);h2.jw&&h2.jw.rotation.set(0,0,0);h2.tl&&h2.tl.rotation.set(.3,0,0);h2.lgs.forEach(l=>l.rotation.set(0,0,0));h2.rb=null;h2.ron=false;h2.rp='f';h2.rtime=0}}continue}
  h2.ait-=d;
  if(h2.ait<=0){h2.ait=3+Math.random()*5;if(Math.random()>.4)h2.aim={x:h2.g.position.x+(Math.random()-.5)*80,z:h2.g.position.z+(Math.random()-.5)*80};else h2.aim=null}
  if(h2.aim){const dx=h2.aim.x-h2.g.position.x,dz=h2.aim.z-h2.g.position.z;if(Math.sqrt(dx*dx+dz*dz)>2){const tr=Math.atan2(dx,dz);h2.g.rotation.y+=(tr-h2.g.rotation.y)*.05;h2.s=Math.min(h2.s+.003,.06);const nx=h2.g.position.x+Math.sin(h2.g.rotation.y)*h2.s,nz=h2.g.position.z+Math.cos(h2.g.rotation.y)*h2.s;const r3=colCheck(nx,nz,1.5);h2.g.position.x=r3.x;h2.g.position.z=r3.z;h2.wc+=h2.s;h2.lgs.forEach(l=>l.rotation.x=h2.wc);h2.hd.position.z=1.6+Math.sin(h2.wc)*.05;h2.hd.position.y=2.5+Math.sin(h2.wc*.5)*.03}else{h2.s*=.95;h2.wc=0;h2.lgs.forEach(l=>l.rotation.x*=.9);h2.hd.position.z+=(1.6-h2.hd.position.z)*.08;h2.hd.position.y+=(2.5-h2.hd.position.y)*.08}
  }else{h2.s*=.95;h2.wc=0;h2.lgs.forEach(l=>l.rotation.x*=.9);h2.hd.position.z+=(1.6-h2.hd.position.z)*.08;h2.hd.position.y+=(2.5-h2.hd.position.y)*.08}
 }

 // UI
 let nh=false;if(!isRiding&&!isD&&mp===0){for(const h2 of HORSES){if(!h2.ra&&!h2.rider&&PL.g.position.distanceTo(h2.g.position)<5){nh=true;break}}}
 document.getElementById('act-m').style.display=nh||isRiding?'flex':'none';
 document.getElementById('act-a').style.display='flex';
 hp=Math.max(0,Math.min(100,hp));document.getElementById('hp-f').style.width=hp+'%';document.getElementById('hp-t').textContent='HP: '+Math.round(hp);

 // Camera
 if(isMv||(isRiding&&Math.abs(hSp)>.01)||(!isRiding&&Math.abs(pSp)>.01))camRet=0;else if(!isDrag)camRet+=d;
 const tar=isRiding&&curHorse?curHorse.g:PL.g,mRot=isRiding?hRot:pRot;
 const rb=Math.min(camRet/3,1),sb=rb*rb*(3-2*rb),cr=mRot+(camAngX-mRot)*sb;
 const cx=tar.position.x-Math.sin(cr)*camDist,cz=tar.position.z-Math.cos(cr)*camDist,cy=camDist*camAngY+3;
 C.position.x+=(cx-C.position.x)*.06;C.position.y+=(cy-C.position.y)*.06;C.position.z+=(cz-C.position.z)*.06;C.lookAt(tar.position.x,2,tar.position.z);

 // Horse face
 heb*=.99;hjo*=.99;
 if(curHorse){const ba=heb*1.5,es=1+ba;curHorse.ew1.scale.x+=(es-curHorse.ew1.scale.x)*.1;curHorse.ew1.scale.y+=(es-curHorse.ew1.scale.y)*.1;curHorse.ew2.scale.x+=(es-curHorse.ew2.scale.x)*.1;curHorse.ew2.scale.y+=(es-curHorse.ew2.scale.y)*.1;const po=ba*.2;curHorse.ep1.position.z+=(2.19+po-curHorse.ep1.position.z)*.1;curHorse.ep2.position.z+=(2.19+po-curHorse.ep2.position.z)*.1;const ps2=1+ba*.3;curHorse.ep1.scale.x+=(ps2-curHorse.ep1.scale.x)*.1;curHorse.ep1.scale.y+=(ps2-curHorse.ep1.scale.y)*.1;curHorse.ep2.scale.x+=(ps2-curHorse.ep2.scale.x)*.1;curHorse.ep2.scale.y+=(ps2-curHorse.ep2.scale.y)*.1;curHorse.jw.position.y+=(2.1-hjo*.35-curHorse.jw.position.y)*.1;curHorse.jw.rotation.x+=(hjo*.8-curHorse.jw.rotation.x)*.1}
 R.render(S,C);
}
animate();
window.addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
</script>
</body>
